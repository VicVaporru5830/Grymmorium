<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magia Arcana</title>

  <!-- Estilos principales -->
  <link rel="stylesheet" href="style.css" />

  <style>
    #map {
      width: 100%;
      height: 400px;
      margin-top: 10px;
      border-radius: 10px;
    }
    .error {
      color: #ff4a4a;
      font-weight: bold;
      margin-top: 10px;
    }
    #map3d {
      width: 100%;
      height: 400px;
      border-radius: 10px;
      position: relative;
    }
  </style>

  <!-- Mapbox GL CSS -->
  <link 
    href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" 
    rel="stylesheet" 
  />
</head>

<body>

  <div class="overlay"></div>

  <div class="container">

    <h1>MAGIA ARCANA</h1>

    <!-- REDES -->
    <h2>Redes Sociales</h2>

    <div class="social-buttons">
      <button onclick="cargarVideosYouTube()">Ver rituales en YouTube</button>
      <button onclick="cargarPostsFacebook()">Ver posts mágicos de Facebook</button>
    </div>

    <div id="youtube-videos"></div>
    <div id="facebook-posts"></div>

    <p id="youtube-error" class="error"></p>
    <p id="facebook-error" class="error"></p>

    <!-- 2FA -->
    <h2>Verificación en 2 pasos</h2>

    <button onclick="enviarCodigo()">📩 Enviar código mágico a mi correo</button>
    <br><br>

    <input type="text" id="codigo" placeholder="Ingresa el código arcano" />
    <button onclick="verificarCodigo()">Verificar código</button>

    <p id="verificacion-msg"></p>

    <!-- MAPA -->
    <h2>Mapa</h2>
    <div id="map"></div>
    <p id="map-error" class="error"></p>

    <!-- IA -->
    <h2>Chat IA de Sabiduría Mágica</h2>
    <input type="text" id="pregunta" placeholder="Pregunta sobre hechizos, magia o rituales" />
    <button onclick="preguntarIA()">Preguntar</button>
    <p id="respuesta"></p>

    <!-- REPRODUCTOR -->
    <h2>Reproductor</h2>
    <div class="player">
      <div class="player-wrap">
        <video id="main-video" controls playsinline preload="metadata"></video>
        <div class="player-overlay">
          <span id="main-filename">Selecciona un video encantado…</span>
        </div>
      </div>
      <div class="player-meta">
        <div id="main-extra"></div>
      </div>
    </div>

    <!-- PAGOS -->
    <h2>Apoyar el proyecto</h2>
    <p style="text-align:center; margin: 0 0 10px;">
      Si te gusta este proyecto, puedes apoyar con una donación mágica. ✨
    </p>

    <input id="buyerEmail" type="email" placeholder="Tu correo para enviarte el recibo" required />

    <div style="display:flex; justify-content:center; margin-bottom: 20px;">
      <button onclick="pagar()">💳 Pagar $12 MXN</button>
    </div>

    <!-- STREAMING -->
    <h2>Mis Videos (Streaming)</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <label>Subir video MP4/WEBM/OGG:</label>
      <input type="file" id="video" name="video" accept="video/mp4,video/webm,video/ogg" required />
      <button type="submit">Subir video</button>
      <p id="upload-status"></p>
    </form>

    <button id="refreshBtn" type="button">Actualizar lista</button>
    <div id="videos-grid"></div>

    <!-- MAPBOX 3D -->
    <h2>Exploración 3D (Mapbox)</h2>
    <div id="map3d"></div>
    <p id="map3d-error" class="error"></p>

  </div>

  <!-- MAPBOX JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

  <!-- SCRIPT PRINCIPAL -->
  <script src="script.js"></script>

  <!-- GOOGLE MAPS -->
  <script>
    function gm_authFailure() {
      document.getElementById("map-error").innerText =
        "Error: API Key inválida o dominio no autorizado.";
    }
  </script>

  <script async 
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFOwFuxoNRk3NDmSTeui88vUY1nCnLTFI&callback=initMap">
  </script>

</body>
</html>
