<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto Web Completo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Overlay para oscurecer fondo -->
  <div class="overlay"></div>

  <!-- Contenedor principal -->
  <div class="container">
    <h1>Proyecto con APIs y Chat de Dinosaurios</h1>

    <!-- BOTONES YOUTUBE Y FACEBOOK -->
    <h2>Redes Sociales</h2>
    <div class="social-buttons">
      <button onclick="cargarVideosYouTube()">Ver videos YouTube</button>
      <button onclick="cargarPostsFacebook()">Ver posts Facebook</button>
    </div>

    <!-- Contenedor dinámico YouTube -->
    <div id="youtube-videos"></div>

    <!-- Contenedor dinámico Facebook -->
    <div id="facebook-posts"></div>

    <!-- VERIFICACIÓN 2 PASOS SIMPLE -->
    <h2>Verificación en 2 pasos</h2>
    <input type="text" id="codigo" placeholder="Ingresa código">
    <button onclick="verificarCodigo()">Verificar</button>
    <p id="verificacion-msg"></p>

    <!-- MAPA -->
    <h2>Mapa</h2>
    <div id="map"></div>

    <!-- IA -->
    <h2>Chat IA sobre Dinosaurios</h2>
    <input type="text" id="pregunta" placeholder="Pregunta sobre dinosaurios">
    <button onclick="preguntarIA()">Preguntar</button>
    <p id="respuesta"></p>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
  
  <!-- Google Maps -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap">
  </script>
</body>
</html>
