<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grymmorium</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    #map {
      width: 100%;
      height: 400px;
      margin-top: 10px;
      border-radius: 10px;
    }
    .error {
      color: #ff4a4a;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
</head>

<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>Grymmorium</h1>

    <!-- VIDEOS MÁGICOS -->
    <h2>Videos Mágicos</h2>
    <div class="social-buttons">
      <button onclick="cargarVideosYouTube()">Hechizos en YouTube</button>
      <button onclick="cargarPostsFacebook()">Runas de Facebook</button>
    </div>

    <div id="youtube-videos"></div>
    <div id="facebook-posts"></div>
    <p id="youtube-error" class="error"></p>
    <p id="facebook-error" class="error"></p>

    <!-- 2FA -->
    <h2>Verificación Arcana</h2>
    <button onclick="enviarCodigo()">📨 Enviar código mágico</button>
    <br><br>
    <input type="text" id="codigo" placeholder="Ingresa el código..." />
    <button onclick="verificarCodigo()">Verificar código</button>
    <p id="verificacion-msg"></p>

    <!-- MAPA -->
    <h2>Mapa Arcano</h2>
    <div id="map"></div>
    <p id="map-error" class="error"></p>

    <!-- IA -->
    <h2>Oráculo Arcano</h2>
    <input type="text" id="pregunta" placeholder="Haz tu consulta mágica..." />
    <button onclick="preguntarIA()">Invocar respuesta</button>
    <p id="respuesta"></p>

    <!-- STREAMING -->
    <h2>Oráculo Visual</h2>
    <div class="player">
      <div class="player-wrap">
        <video id="main-video" controls playsinline preload="metadata"></video>
        <div class="player-overlay">
          <span id="main-filename">Selecciona un video mágico…</span>
        </div>
      </div>
      <div class="player-meta">
        <div id="main-extra"></div>
      </div>
    </div>

    <h2>Subir Videos Mágicos</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <label>Subir video de hechizo (MP4/WEBM/OGG):</label>
      <input type="file" id="video" name="video" accept="video/mp4,video/webm,video/ogg" required />
      <button type="submit">Subir Video</button>
      <p id="upload-status"></p>
    </form>

    <button id="refreshBtn" type="button">Actualizar lista</button>
    <div id="videos-grid"></div>

    <!-- MAPBOX 3D -->
    <h2>Exploración Arcana 3D</h2>
    <div id="map3d" style="width:100%; height:400px; border-radius:10px;"></div>
    <p id="map3d-error" class="error"></p>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-jsre() {
      document.getElementById("map-error").innerText =
        "Error: API Key inválida o dominio no autorizado.";
    }
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFOwFuxoNRk3NDmSTeui88vUY1nCnLTFI&callback=initMap"></script>
</body>
</html>
