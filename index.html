<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grymmorium Arcano</title>

    <style>
        body {
            background: #0d0d0d;
            color: #e8dbaa;
            font-family: "Georgia", serif;
            padding: 20px;
            text-shadow: 0 0 4px #000;
        }
        h1, h2 {
            color: #f7e9b5;
            text-shadow: 0 0 8px #6b4a16;
        }
        button {
            background: #4a2d09;
            color: #ffe9b0;
            border: 1px solid #c89b3c;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 6px;
            margin: 5px 0;
        }
        #map, #map3d {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .error {
            color: #ff6f6f;
            font-weight: bold;
        }
    </style>

</head>
<body>

<h1>📜 Grymmorium Arcano</h1>

<h2>🔮 Oráculo de Sabiduría Mística</h2>
<input id="pregunta" type="text" placeholder="Pregunta algo sobre magia, alquimia o hechicería...">
<button onclick="preguntarIA()">Invocar respuesta</button>
<p id="respuesta"></p>

<h2>📺 Rituales Visuales (YouTube)</h2>
<button onclick="cargarVideosYouTube()">Revelar conjuro visual</button>
<div id="youtube-videos"></div>
<p id="youtube-error" class="error"></p>

<h2>📘 Mapa Arcano</h2>
<div id="map"></div>
<p id="map-error" class="error"></p>

<h2>🏺 Reliquias del Gremio (Videos subidos)</h2>
<form id="uploadForm">
    <label>Subir reliquia (Video):</label>
    <input type="file" id="video" name="video" accept="video/mp4,video/webm,video/ogg">
    <button type="submit">Cargar reliquia</button>
</form>
<p id="upload-status"></p>
<button id="refreshBtn">Actualizar reliquias</button>
<div id="videos-grid"></div>

<script src="script.js"></script>

</body>
</html>
