<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Escanear QR</title>
  <style>
    #reader { width: 300px; }
  </style>
</head>
<body>

<h2>Escanear código QR</h2>
<div id="reader"></div>
<p id="msg"></p>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const BACKEND = "https://Jovanfinal.onrender.com"; // AJUSTAR

async function verify(token){
  const r = await fetch(`${BACKEND}/api/qr/verify.php`,{
    method: "POST",
    credentials: "include",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({token})
  });

  const data = await r.json();
  if(r.ok){
    msg.textContent="✓ Verificación exitosa";
    setTimeout(()=>window.location="dashboard.html",1000);
  } else {
    msg.textContent=data.error;
  }
}

function onScanSuccess(decodedText){
  verify(decodedText);
}

new Html5Qrcode("reader")
  .start({ facingMode:"environment" }, { fps:10, qrbox:250 }, onScanSuccess);
</script>

</body>
</html>
