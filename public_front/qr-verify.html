<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificación QR</title>
</head>
<body>

<h2>Verificación por QR</h2>
<p>Escanea este código desde tu teléfono para completar la verificación.</p>

<div id="qrcode"></div>

<a href="scanner.html">Escanear desde mi teléfono</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const BACKEND = "https://Jovanfinal.onrender.com"; // AJUSTA

async function mostrarQR(){
  const r = await fetch(`${BACKEND}/api/qr/start.php`, {
    credentials: "include"
  });
  const data = await r.json();

  new QRCode(document.getElementById("qrcode"), data.token);
}

mostrarQR();
</script>

</body>
</html>
