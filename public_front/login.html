<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
<h1>Iniciar sesión</h1>

<input id="email" type="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>
<button onclick="login()">Entrar</button>

<p id="msg" style="color:red;"></p>

<script>
const BACKEND="https://Jovanfinal.onrender.com"; // AJUSTA

async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('pass').value;

  const r = await fetch(`${BACKEND}/api/login.php`, {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await r.json();
  if(!r.ok){
    document.getElementById('msg').textContent = data.error;
    return;
  }

  window.location = "qr-verify.html";
}
</script>

</body>
</html>
